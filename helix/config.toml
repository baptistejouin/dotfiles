theme = "github_dark"

[editor]
line-number = "relative"
color-modes = true

[editor.soft-wrap]
enable = true

[editor.statusline]
left = ["mode", "file-name", "file-modification-indicator", "spacer", "spinner"]
center = []
right = [
  "diagnostics",
  "selections",
  "position",
  "file-type",
  "version-control",
  "spacer",
]

[keys.normal]
C-h = "jump_view_left"
C-l = "jump_view_right"
C-j = "jump_view_down"
C-k = "jump_view_down"
C-b = ":sh git blame -L %{cursor_line},%{cursor_line} %{buffer_name}"

[editor.inline-diagnostics]
cursor-line = "warning" # minimum severity that a diagnostic must have to be shown inline on the line that contains the primary cursor
max-wrap = 20
